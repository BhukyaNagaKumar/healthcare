<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Health Camp</title>
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="text-center mb-6">
            <a href="index.html" class="logo justify-center" style="justify-content: center; margin-bottom: 1rem;">
                <i class="fa-solid fa-heart-pulse"></i> HealthCamp
            </a>
            <h2>Welcome Back</h2>
            <p class="text-light mt-1">Please sign in to your dashboard</p>
        </div>

        <form id="loginForm" action="javascript:void(0);">
            <div class="form-group">
                <label class="form-label">Role</label>
                <select id="roleSelect" class="form-select">
                    <option value="patient">Patient</option>
                    <option value="doctor">Doctor</option>
                    <option value="admin">Administrator</option>
                </select>
            </div>
            
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="Enter your email" required>
            </div>
            
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" class="form-control" placeholder="Enter password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
                <i class="fa-solid fa-right-to-bracket"></i> Sign In
            </button>
            
            <div class="text-center mt-4">
                <p class="text-light">Don't have an account? <a href="#" style="color: var(--primary); font-weight: 500;">Register here</a></p>
            </div>
        </form>
    </div>

    <script src="scripts/app.js"></script>
</body>
</html>
